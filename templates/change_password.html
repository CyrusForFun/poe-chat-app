<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Cyrus AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-box {
            background: #151515;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            max-width: 90vw;
        }
        .auth-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #fff; }
        .back { color: #6b5ce7; text-decoration: none; font-size: 14px; }
        .back:hover { text-decoration: underline; }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
        .field input {
            width: 100%; background: #1e1e1e; border: 1px solid #333; color: #e0e0e0;
            padding: 12px 14px; border-radius: 8px; font-size: 15px;
        }
        .field input:focus { outline: none; border-color: #6b5ce7; }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px;
            background: #6b5ce7; color: #fff;
        }
        .btn:hover { background: #5a4bd6; }
        .error {
            background: #3d1f1f; border: 1px solid #6b2a2a; color: #f5a5a5;
            padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 18px;
        }
        .success {
            background: #1f3d2a; border: 1px solid #2a6b3a; color: #a5f5b5;
            padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 18px;
        }
    </style>
</head>
<body>
    <div class="auth-box">
        <a href="/" class="back">&larr; Back to Chat</a>
        <h1>Change Password</h1>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        {% if success %}<div class="success">Password changed successfully!</div>{% endif %}
        <form method="POST" style="margin-top: 20px;">
            <div class="field">
                <label>Current Password</label>
                <input type="password" name="current_password" required>
            </div>
            <div class="field">
                <label>New Password</label>
                <input type="password" name="new_password" required minlength="6" placeholder="At least 6 characters">
            </div>
            <button type="submit" class="btn">Update Password</button>
        </form>
    </div>
</body>
</html>
