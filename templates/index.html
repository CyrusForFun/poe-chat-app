<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poe Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1a1a1a;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a2a2a;
        }
        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        select {
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            margin-left: auto;
        }
        #clear-btn {
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        #clear-btn:hover { background: #3a3a3a; }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .user-msg {
            align-self: flex-end;
            background: #2563eb;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .assistant-msg {
            align-self: flex-start;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-bottom-left-radius: 4px;
        }
        .typing-indicator {
            align-self: flex-start;
            color: #888;
            font-size: 14px;
            padding: 8px 16px;
        }
        #input-area {
            padding: 16px 20px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 10px;
        }
        #msg-input {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            resize: none;
            min-height: 46px;
            max-height: 150px;
            font-family: inherit;
        }
        #msg-input:focus { outline: none; border-color: #2563eb; }
        #send-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #send-btn:hover:not(:disabled) { background: #1d4ed8; }
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }
    </style>
</head>
<body>
    <header>
        <h1>Poe Chat</h1>
        <select id="model-select">
            {% for m in models %}
            <option value="{{ m }}">{{ m }}</option>
            {% endfor %}
        </select>
        <button id="clear-btn" onclick="clearChat()">Clear</button>
    </header>
    <div id="chat-container"></div>
    <div id="input-area">
        <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');
        let messages = [];
        let isStreaming = false;

        msgInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        msgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}-msg`;
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function clearChat() {
            messages = [];
            chatContainer.innerHTML = '';
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || isStreaming) return;

            isStreaming = true;
            sendBtn.disabled = true;
            msgInput.value = '';
            msgInput.style.height = 'auto';

            addMessage('user', text);
            messages.push({ role: 'user', content: text });

            const assistantDiv = addMessage('assistant', '');
            let fullContent = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: messages,
                        model: modelSelect.value,
                    }),
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const lines = decoder.decode(value).split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') break;
                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.error) {
                                    assistantDiv.textContent = 'Error: ' + parsed.error;
                                } else if (parsed.content) {
                                    fullContent += parsed.content;
                                    assistantDiv.textContent = fullContent;
                                    chatContainer.scrollTop = chatContainer.scrollHeight;
                                }
                            } catch {}
                        }
                    }
                }

                messages.push({ role: 'assistant', content: fullContent });
            } catch (err) {
                assistantDiv.textContent = 'Connection error: ' + err.message;
            }

            isStreaming = false;
            sendBtn.disabled = false;
            msgInput.focus();
        }

        msgInput.focus();
    </script>
</body>
</html>
