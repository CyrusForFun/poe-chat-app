<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cyrus AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-box {
            background: #151515;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            max-width: 90vw;
        }
        .auth-box h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }
        .auth-box p.sub {
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 15px;
        }
        .field input:focus {
            outline: none;
            border-color: #6b5ce7;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
            background: #6b5ce7;
            color: #fff;
        }
        .btn:hover { background: #5a4bd6; }
        .error {
            background: #3d1f1f;
            border: 1px solid #6b2a2a;
            color: #f5a5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
        .link a { color: #6b5ce7; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h1>Welcome back</h1>
        <p class="sub">Sign in to continue</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="field">
                <label>Email</label>
                <input type="email" name="email" required autofocus>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="link">Don't have an account? <a href="/register">Register</a></div>
        <div class="link" style="margin-top:12px;"><a href="/pricing">View Pricing</a></div>
    </div>
</body>
</html>
