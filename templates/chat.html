<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poe Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: #111;
            border-right: 1px solid #1e1e1e;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #1e1e1e;
        }
        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: #6b5ce7;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .new-chat-btn:hover { background: #5a4bd6; }
        .conv-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .conv-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #bbb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2px;
        }
        .conv-item:hover { background: #1a1a1a; }
        .conv-item.active { background: #1e1e1e; color: #fff; }
        .conv-item .conv-title { flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .conv-item .conv-delete {
            opacity: 0;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
        }
        .conv-item:hover .conv-delete { opacity: 1; }
        .conv-item .conv-delete:hover { color: #f5a5a5; }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid #1e1e1e;
            font-size: 13px;
        }
        .sidebar-footer .user-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-footer .user-email {
            color: #888;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .sidebar-footer a {
            color: #6b5ce7;
            text-decoration: none;
            font-size: 12px;
            white-space: nowrap;
            margin-left: 8px;
        }
        .sidebar-footer a:hover { text-decoration: underline; }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .main-header {
            padding: 12px 20px;
            border-bottom: 1px solid #1e1e1e;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0f0f0f;
        }
        .model-select {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #2a2a2a;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .model-select:focus { outline: none; border-color: #6b5ce7; }
        .model-label {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        /* ── Chat area ── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .messages {
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 20px;
            flex: 1;
        }
        .message {
            margin-bottom: 24px;
            display: flex;
            gap: 14px;
        }
        .message .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }
        .message.user-msg .avatar {
            background: #2563eb;
            color: #fff;
        }
        .message.bot-msg .avatar {
            background: #6b5ce7;
            color: #fff;
        }
        .message .content {
            flex: 1;
            line-height: 1.7;
            font-size: 15px;
            padding-top: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user-msg .content { color: #e0e0e0; }
        .message.bot-msg .content { color: #d0d0d0; }
        .message .content img.chat-img {
            max-width: 300px;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
            cursor: pointer;
        }
        .message .content img.chat-img:hover { opacity: 0.85; }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #444;
            gap: 12px;
        }
        .empty-state .logo {
            font-size: 48px;
            font-weight: 800;
            color: #6b5ce7;
        }
        .empty-state p { font-size: 15px; }

        /* ── Input area ── */
        .input-area {
            padding: 16px 20px 24px;
            background: #0a0a0a;
        }
        .input-box {
            max-width: 760px;
            margin: 0 auto;
        }
        /* Preview bar */
        .preview-bar {
            display: flex;
            gap: 8px;
            padding: 8px 8px 0;
            flex-wrap: wrap;
        }
        .preview-bar:empty { display: none; }
        .preview-item {
            position: relative;
            width: 64px;
            height: 64px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .toolbar-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #999;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .toolbar-btn:hover { color: #e0e0e0; border-color: #6b5ce7; }
        .toolbar-btn svg { width: 20px; height: 20px; }
        .input-wrapper textarea {
            flex: 1;
            background: #151515;
            border: 1px solid #2a2a2a;
            color: #e0e0e0;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 15px;
            resize: none;
            min-height: 50px;
            max-height: 160px;
            font-family: inherit;
            line-height: 1.5;
        }
        .input-wrapper textarea:focus { outline: none; border-color: #6b5ce7; }
        .send-btn {
            background: #6b5ce7;
            color: #fff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .send-btn:hover:not(:disabled) { background: #5a4bd6; }
        .send-btn svg { width: 20px; height: 20px; }

        /* hidden inputs */
        .hidden { display: none; }

        /* scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* mobile */
        @media (max-width: 768px) {
            .sidebar { display: none; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
        </div>
        <div class="conv-list" id="conv-list">
            {% for c in conversations %}
            <div class="conv-item" data-id="{{ c.id }}" onclick="loadConversation({{ c.id }})">
                <span class="conv-title">{{ c.title }}</span>
                <button class="conv-delete" onclick="event.stopPropagation(); deleteConversation({{ c.id }})">&times;</button>
            </div>
            {% endfor %}
        </div>
        <div class="sidebar-footer">
            <div class="user-info">
                <span class="user-email">{{ user.email }}</span>
                {% if user.is_admin %}
                <a href="/admin">Admin</a>
                {% endif %}
                <a href="/logout">Logout</a>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="main-header">
            <span class="model-label" id="model-label">Select a model</span>
            <select class="model-select" id="model-select" onchange="changeModel()">
                {% for m in models %}
                <option value="{{ m }}">{{ m }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="chat-area" id="chat-area">
            <div class="empty-state" id="empty-state">
                <div class="logo">Poe</div>
                <p>Start a new conversation</p>
            </div>
            <div class="messages" id="messages" style="display:none;"></div>
        </div>
        <div class="input-area">
            <div class="input-box">
                <div class="preview-bar" id="preview-bar"></div>
                <div class="input-wrapper">
                    <!-- Upload file -->
                    <input type="file" id="file-input" class="hidden" accept="image/*" multiple>
                    <button class="toolbar-btn" onclick="document.getElementById('file-input').click()" title="Upload image">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </button>
                    <!-- Camera -->
                    <input type="file" id="camera-input" class="hidden" accept="image/*" capture="environment">
                    <button class="toolbar-btn" onclick="document.getElementById('camera-input').click()" title="Take photo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    </button>
                    <textarea id="msg-input" placeholder="Send a message..." rows="1"></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('messages');
        const emptyState = document.getElementById('empty-state');
        const chatArea = document.getElementById('chat-area');
        const modelSelect = document.getElementById('model-select');
        const convList = document.getElementById('conv-list');
        const previewBar = document.getElementById('preview-bar');
        const fileInput = document.getElementById('file-input');
        const cameraInput = document.getElementById('camera-input');

        let currentConvId = null;
        let isStreaming = false;
        let pendingImages = []; // base64 data URIs

        // ── File / Camera handling ──
        fileInput.addEventListener('change', handleFiles);
        cameraInput.addEventListener('change', handleFiles);

        function handleFiles(e) {
            const files = e.target.files;
            for (const file of files) {
                if (!file.type.startsWith('image/')) continue;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    pendingImages.push(ev.target.result);
                    renderPreviews();
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        }

        function renderPreviews() {
            previewBar.innerHTML = '';
            pendingImages.forEach((src, i) => {
                const item = document.createElement('div');
                item.className = 'preview-item';
                item.innerHTML = `<img src="${src}"><button class="remove-btn" onclick="removePreview(${i})">&times;</button>`;
                previewBar.appendChild(item);
            });
        }

        function removePreview(index) {
            pendingImages.splice(index, 1);
            renderPreviews();
        }

        // ── Textarea ──
        msgInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 160) + 'px';
        });
        msgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ── Paste image from clipboard ──
        msgInput.addEventListener('paste', function(e) {
            const items = e.clipboardData?.items;
            if (!items) return;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    e.preventDefault();
                    const file = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        pendingImages.push(ev.target.result);
                        renderPreviews();
                    };
                    reader.readAsDataURL(file);
                }
            }
        });

        // ── Drag and drop ──
        const inputArea = document.querySelector('.input-area');
        inputArea.addEventListener('dragover', (e) => { e.preventDefault(); });
        inputArea.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            for (const file of files) {
                if (!file.type.startsWith('image/')) continue;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    pendingImages.push(ev.target.result);
                    renderPreviews();
                };
                reader.readAsDataURL(file);
            }
        });

        // ── Conversation management ──
        function setActiveConv(id) {
            document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
            if (id) {
                const el = document.querySelector(`.conv-item[data-id="${id}"]`);
                if (el) el.classList.add('active');
            }
        }

        async function newChat() {
            const model = modelSelect.value;
            const res = await fetch('/conversation/new', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({model}),
            });
            const data = await res.json();
            currentConvId = data.id;
            const item = document.createElement('div');
            item.className = 'conv-item active';
            item.dataset.id = data.id;
            item.onclick = () => loadConversation(data.id);
            item.innerHTML = `<span class="conv-title">New Chat</span><button class="conv-delete" onclick="event.stopPropagation(); deleteConversation(${data.id})">&times;</button>`;
            convList.prepend(item);
            setActiveConv(data.id);
            messagesDiv.innerHTML = '';
            messagesDiv.style.display = 'block';
            emptyState.style.display = 'none';
            msgInput.focus();
        }

        async function loadConversation(id) {
            const res = await fetch(`/conversation/${id}`);
            const data = await res.json();
            if (data.error) return;
            currentConvId = id;
            modelSelect.value = data.model;
            setActiveConv(id);
            messagesDiv.innerHTML = '';
            messagesDiv.style.display = 'block';
            emptyState.style.display = 'none';
            for (const msg of data.messages) {
                appendMessage(msg.role, msg.content);
            }
            chatArea.scrollTop = chatArea.scrollHeight;
            msgInput.focus();
        }

        async function deleteConversation(id) {
            await fetch(`/conversation/${id}`, {method: 'DELETE'});
            const el = document.querySelector(`.conv-item[data-id="${id}"]`);
            if (el) el.remove();
            if (currentConvId === id) {
                currentConvId = null;
                messagesDiv.innerHTML = '';
                messagesDiv.style.display = 'none';
                emptyState.style.display = 'flex';
            }
        }

        async function changeModel() {
            if (!currentConvId) return;
            await fetch(`/conversation/${currentConvId}/model`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({model: modelSelect.value}),
            });
        }

        // ── Message rendering ──
        function appendMessage(role, content) {
            const div = document.createElement('div');
            const isUser = role === 'user';
            div.className = `message ${isUser ? 'user-msg' : 'bot-msg'}`;
            div.innerHTML = `
                <div class="avatar">${isUser ? 'U' : 'AI'}</div>
                <div class="content"></div>
            `;
            const contentEl = div.querySelector('.content');

            // Try parsing multimodal content
            let textContent = content;
            let images = [];
            try {
                const parsed = JSON.parse(content);
                if (parsed && parsed.images) {
                    textContent = parsed.text || '';
                    images = parsed.images || [];
                }
            } catch {}

            if (textContent) {
                const textNode = document.createElement('span');
                textNode.textContent = textContent;
                contentEl.appendChild(textNode);
            }
            for (const src of images) {
                const img = document.createElement('img');
                img.className = 'chat-img';
                img.src = src;
                img.onclick = () => window.open(src, '_blank');
                contentEl.appendChild(img);
            }

            messagesDiv.appendChild(div);
            return contentEl;
        }

        // ── Send message ──
        async function sendMessage() {
            const text = msgInput.value.trim();
            const images = [...pendingImages];
            if ((!text && images.length === 0) || isStreaming) return;

            if (!currentConvId) await newChat();

            isStreaming = true;
            sendBtn.disabled = true;
            msgInput.value = '';
            msgInput.style.height = 'auto';
            pendingImages = [];
            previewBar.innerHTML = '';

            // Show user message with images
            if (images.length > 0) {
                appendMessage('user', JSON.stringify({text, images}));
            } else {
                appendMessage('user', text);
            }
            chatArea.scrollTop = chatArea.scrollHeight;

            // Bot placeholder
            const botContent = appendMessage('assistant', '');
            let fullContent = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        conversation_id: currentConvId,
                        message: text,
                        images: images.length > 0 ? images : undefined,
                        model: modelSelect.value,
                    }),
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    const lines = decoder.decode(value).split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') break;
                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.error) {
                                    botContent.textContent = 'Error: ' + parsed.error;
                                } else if (parsed.content) {
                                    fullContent += parsed.content;
                                    botContent.textContent = fullContent;
                                    chatArea.scrollTop = chatArea.scrollHeight;
                                }
                            } catch {}
                        }
                    }
                }

                const titleEl = document.querySelector(`.conv-item[data-id="${currentConvId}"] .conv-title`);
                if (titleEl && titleEl.textContent === 'New Chat') {
                    const t = text || 'Image';
                    titleEl.textContent = t.substring(0, 40) + (t.length > 40 ? '...' : '');
                }
            } catch (err) {
                botContent.textContent = 'Connection error: ' + err.message;
            }

            isStreaming = false;
            sendBtn.disabled = false;
            msgInput.focus();
        }

        msgInput.focus();
    </script>
</body>
</html>
